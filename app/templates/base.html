<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>讀書筆記本系統</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fs-4" href="{{ url_for('book_routes.index') }}">
                <i class="fa-solid fa-book-journal-whills me-2"></i>讀書筆記本
            </a>
            <button class="navbar-toggler text-white border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fa-solid fa-bars text-white"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link fs-5 ms-3" href="{{ url_for('book_routes.create') }}">
                            <i class="fa-solid fa-pen-nib me-1"></i> 寫筆記
                        </a>
                    </li>
                </ul>
                <form class="d-flex" action="{{ url_for('book_routes.search') }}" method="GET">
                    <input class="form-control me-2 rounded-pill border-0 px-4" type="search" name="q" placeholder="找找哪本書？" aria-label="Search" value="{{ search_query if search_query else '' }}">
                    <button class="btn btn-light rounded-pill px-4" style="color: var(--primary-color); font-weight: bold;" type="submit">搜尋</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5 min-vh-100">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-4">
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show shadow-sm border-0 rounded-4 animate-fade-in" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center py-4 mt-5">
        <div class="container border-top pt-4">
            <p class="text-muted mb-0"><small>&copy; 2026 讀書筆記本系統 (Book Notes Architecture). Built with Flask.</small></p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
